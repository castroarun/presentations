<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI in Action — Full Deck · Arun Castro</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link
    href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: #000;
      font-family: 'JetBrains Mono', monospace;
    }

    .deck {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
      background: #0a0a0b;
    }

    iframe.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* Edge navigation arrows — always visible, even fullscreen */
    .edge {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: rgba(10, 10, 11, 0.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.3rem;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      z-index: 1500;
      transition: all 0.25s ease;
      opacity: 0.35;
    }

    .edge:hover {
      opacity: 1;
      background: rgba(245, 158, 11, 0.15);
      border-color: rgba(245, 158, 11, 0.5);
      color: #fbbf24;
      box-shadow: 0 0 24px rgba(245, 158, 11, 0.3);
    }

    .edge.left { left: 1.2rem; }
    .edge.right { right: 1.2rem; }

    .edge:disabled {
      opacity: 0.08;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* Bottom navigation pill */
    .nav {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.4rem;
      align-items: center;
      z-index: 1000;
      background: rgba(10, 10, 11, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 999px;
      padding: 0.45rem 0.65rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      transition: opacity 0.3s;
    }

    .nav.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .nav-btn {
      background: transparent;
      border: none;
      color: #aaa;
      font-family: inherit;
      font-size: 0.9rem;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }

    .nav-btn:hover {
      background: rgba(245, 158, 11, 0.12);
      color: #fbbf24;
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .nav-btn:disabled:hover {
      background: transparent;
      color: #aaa;
    }

    .dots {
      display: flex;
      gap: 0.4rem;
      padding: 0 0.5rem;
      align-items: center;
    }

    .dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: #777;
      font-family: inherit;
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s;
    }

    .dot:hover {
      border-color: rgba(245, 158, 11, 0.4);
      color: #fbbf24;
    }

    .dot.active {
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      border-color: transparent;
      color: #0a0a0b;
      font-weight: 600;
      box-shadow: 0 0 16px rgba(245, 158, 11, 0.4);
    }

    .indicator {
      font-size: 0.7rem;
      color: #555;
      letter-spacing: 0.15em;
      padding: 0 0.6rem;
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      margin-left: 0.2rem;
    }

    .indicator strong {
      color: #fbbf24;
      font-weight: 600;
    }

    /* Slide title display (top-center, fades in briefly on slide change) */
    .slide-title {
      position: fixed;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 999;
      background: rgba(10, 10, 11, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 999px;
      padding: 0.4rem 1rem;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #888;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }

    .slide-title.show { opacity: 1; }

    .slide-title .accent {
      color: #fbbf24;
      margin-right: 0.5rem;
    }

    /* Help overlay (toggle with ?) */
    .help {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 11, 0.92);
      backdrop-filter: blur(20px);
      z-index: 2000;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 2rem;
      color: #f5f5f7;
      padding: 2rem;
    }

    .help.show { display: flex; }

    .help h2 {
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      color: #fbbf24;
      margin-bottom: 0.5rem;
    }

    .help-grid {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 0.8rem 2rem;
      font-size: 0.95rem;
    }

    .help-grid kbd {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      padding: 0.25rem 0.7rem;
      border-radius: 6px;
      font-family: inherit;
      font-size: 0.85rem;
      color: #fbbf24;
      min-width: 70px;
      text-align: center;
    }

    .help-grid span {
      color: #ccc;
      align-self: center;
    }

    .help-close {
      font-size: 0.75rem;
      color: #666;
      letter-spacing: 0.15em;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="deck">
    <iframe data-src="slide-01-opening.html" data-title="Opening · Karpathy"></iframe>
    <iframe data-src="slide-02-speaker.html" data-title="About Myself"></iframe>
    <iframe data-src="slide-03-workflow.html" data-title="The 9-Step Workflow"></iframe>
    <iframe data-src="slide-04-gates.html" data-title="Bill Gates · The Historical Lens"></iframe>
    <iframe data-src="slide-05-acceleration.html" data-title="The Acceleration"></iframe>
    <iframe data-src="slide-06-pichai.html" data-title="Sundar Pichai · The Bigger Picture"></iframe>
    <iframe data-src="slide-07-thanks.html" data-title="Thank You"></iframe>
  </div>

  <button class="edge left" id="edgePrev" title="Previous slide (←)">&larr;</button>
  <button class="edge right" id="edgeNext" title="Next slide (→)">&rarr;</button>

  <div class="slide-title" id="slideTitle">
    <span class="accent">●</span>
    <span id="slideTitleText">Opening · Karpathy</span>
  </div>

  <div class="nav" id="nav">
    <button class="nav-btn" id="prevBtn" title="Previous (←)">&larr;</button>
    <div class="dots" id="dots">
      <button class="dot active" data-i="0">1</button>
      <button class="dot" data-i="1">2</button>
      <button class="dot" data-i="2">3</button>
      <button class="dot" data-i="3">4</button>
      <button class="dot" data-i="4">5</button>
      <button class="dot" data-i="5">6</button>
      <button class="dot" data-i="6">7</button>
    </div>
    <button class="nav-btn" id="nextBtn" title="Next (→)">&rarr;</button>
    <span class="indicator"><strong id="curNum">1</strong> / 7</span>
    <button class="nav-btn" id="helpBtn" title="Help (?)">?</button>
  </div>

  <div class="help" id="help">
    <h2>Keyboard Shortcuts</h2>
    <div class="help-grid">
      <kbd>&rarr;</kbd> <span>Next slide</span>
      <kbd>&larr;</kbd> <span>Previous slide</span>
      <kbd>Space</kbd> <span>Next slide</span>
      <kbd>1 – 7</kbd> <span>Jump to slide</span>
      <kbd>F</kbd> <span>Toggle fullscreen</span>
      <kbd>H</kbd> <span>Hide / show navigation</span>
      <kbd>?</kbd> <span>Show / hide this help</span>
      <kbd>Esc</kbd> <span>Exit fullscreen / close help</span>
    </div>
    <div class="help-close">Press ? or Esc to close</div>
  </div>

  <script>
    const iframes = document.querySelectorAll('iframe');
    const dots = document.querySelectorAll('.dot');
    const total = iframes.length;
    let current = 0;
    let titleTimer = null;

    // Lazy-load iframes — only load when first viewed (faster startup)
    function ensureLoaded(i) {
      const f = iframes[i];
      if (!f.src) {
        f.src = f.dataset.src;
        // Attach keydown listener to iframe's contentDocument once loaded
        // so arrow keys work even when iframe has focus (works for same-origin)
        f.addEventListener('load', () => {
          try {
            const idoc = f.contentDocument;
            if (idoc) {
              idoc.addEventListener('keydown', handleNavKey, true);
            }
          } catch (err) {
            // Cross-origin block — fallback handled via postMessage below
          }
        }, { once: true });
      }
    }

    function show(i, opts = {}) {
      if (i < 0 || i >= total) return;

      ensureLoaded(i);
      // Pre-load adjacent slides for snappy transitions
      if (i + 1 < total) ensureLoaded(i + 1);
      if (i - 1 >= 0) ensureLoaded(i - 1);

      iframes.forEach((f, idx) => {
        f.classList.toggle('active', idx === i);
      });

      dots.forEach((d, idx) => d.classList.toggle('active', idx === i));
      document.getElementById('curNum').textContent = i + 1;
      document.getElementById('prevBtn').disabled = i === 0;
      document.getElementById('nextBtn').disabled = i === total - 1;

      // Show slide title briefly
      const titleEl = document.getElementById('slideTitle');
      const titleText = document.getElementById('slideTitleText');
      titleText.textContent = iframes[i].dataset.title;
      titleEl.classList.add('show');
      clearTimeout(titleTimer);
      titleTimer = setTimeout(() => titleEl.classList.remove('show'), 1800);

      current = i;
    }

    function next() { if (current < total - 1) show(current + 1); }
    function prev() { if (current > 0) show(current - 1); }

    document.getElementById('nextBtn').addEventListener('click', next);
    document.getElementById('prevBtn').addEventListener('click', prev);
    document.getElementById('edgeNext').addEventListener('click', next);
    document.getElementById('edgePrev').addEventListener('click', prev);
    document.getElementById('helpBtn').addEventListener('click', () => {
      document.getElementById('help').classList.toggle('show');
    });

    // Centralized key handler — works whether triggered on parent doc or iframe doc
    function handleNavKey(e) {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      const help = document.getElementById('help');

      if (e.key === '?' || (e.key === '/' && e.shiftKey)) {
        e.preventDefault();
        help.classList.toggle('show');
        return;
      }

      if (e.key === 'Escape') {
        if (help.classList.contains('show')) { help.classList.remove('show'); return; }
        if (document.fullscreenElement) document.exitFullscreen();
        return;
      }

      if (help.classList.contains('show')) return;

      if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
        e.preventDefault(); next();
      } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
        e.preventDefault(); prev();
      } else if (e.key >= '1' && e.key <= '7') {
        show(parseInt(e.key) - 1);
      } else if (e.key === 'f' || e.key === 'F') {
        e.preventDefault();
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
        else document.exitFullscreen();
      } else if (e.key === 'h' || e.key === 'H') {
        document.getElementById('nav').classList.toggle('hidden');
      } else if (e.key === 'Home') {
        show(0);
      } else if (e.key === 'End') {
        show(total - 1);
      }
    }

    // postMessage fallback — slides can post their key events here if direct attach fails
    window.addEventListener('message', (ev) => {
      if (ev.data && ev.data.type === 'deckKey' && ev.data.key) {
        handleNavKey({ key: ev.data.key, target: { tagName: 'BODY' }, preventDefault: () => {}, shiftKey: ev.data.shiftKey || false });
      }
    });

    dots.forEach((d) => {
      d.addEventListener('click', () => show(parseInt(d.dataset.i)));
    });

    document.addEventListener('keydown', handleNavKey);

    // Auto-hide nav after inactivity in fullscreen
    let mouseTimer = null;
    document.addEventListener('mousemove', () => {
      const nav = document.getElementById('nav');
      nav.classList.remove('hidden');
      clearTimeout(mouseTimer);
      if (document.fullscreenElement) {
        mouseTimer = setTimeout(() => nav.classList.add('hidden'), 2500);
      }
    });

    // Init
    show(0);
  </script>
</body>
</html>
