<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You · AI in Action</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet"
  />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%; width: 100%;
      overflow: hidden;
      background: #0a0a0b;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      color: #f5f5f7;
      position: relative;
      cursor: default;
    }

    body:fullscreen, body:-webkit-full-screen { cursor: none; }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 50%, rgba(245, 158, 11, 0.12), transparent 70%),
        radial-gradient(ellipse 50% 40% at 80% 20%, rgba(99, 102, 241, 0.06), transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 240 240' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      mix-blend-mode: overlay;
      z-index: 0;
    }

    /* Floating gold particles (subtle decoration) */
    .sparkle {
      position: fixed;
      border-radius: 50%;
      background: #fbbf24;
      pointer-events: none;
      z-index: 0;
      box-shadow: 0 0 8px #f59e0b;
      animation: float 6s ease-in-out infinite;
    }

    .sparkle:nth-child(1) { top: 18%; left: 12%; width: 3px; height: 3px; animation-delay: 0s; }
    .sparkle:nth-child(2) { top: 28%; right: 18%; width: 2px; height: 2px; animation-delay: 1.2s; }
    .sparkle:nth-child(3) { bottom: 32%; left: 22%; width: 4px; height: 4px; animation-delay: 2.4s; }
    .sparkle:nth-child(4) { bottom: 22%; right: 14%; width: 2px; height: 2px; animation-delay: 0.6s; }
    .sparkle:nth-child(5) { top: 45%; left: 8%; width: 2px; height: 2px; animation-delay: 3s; }
    .sparkle:nth-child(6) { bottom: 45%; right: 8%; width: 3px; height: 3px; animation-delay: 1.8s; }

    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.4; }
      50% { transform: translateY(-20px) scale(1.2); opacity: 1; }
    }

    .slide {
      position: relative; z-index: 1;
      height: 100vh; width: 100vw;
      padding: 5vh 6vw;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 4vh;
    }

    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #8a8a90;
      font-weight: 500;
      opacity: 0;
      animation: fadeIn 0.6s 0.1s forwards;
    }

    .badge { display: flex; align-items: center; gap: 0.6rem; }
    .badge-dot {
      width: 7px; height: 7px;
      background: #f59e0b;
      border-radius: 50%;
      box-shadow: 0 0 14px rgba(245, 158, 11, 0.7);
      animation: pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.85); }
    }
    .header .right { display: flex; gap: 1.2rem; align-items: center; }
    .header .sep { width: 1px; height: 12px; background: #2a2a2e; }
    .clock { font-variant-numeric: tabular-nums; letter-spacing: 0.1em; }

    /* CENTER STAGE */
    .stage {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
      text-align: center;
    }

    .pretitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.18em;
      color: #f59e0b;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 2rem;
      opacity: 0;
      animation: fadeUp 0.7s 0.4s forwards;
    }

    .pretitle .line {
      width: 30px;
      height: 1px;
      background: linear-gradient(90deg, #f59e0b, transparent);
    }

    .pretitle .line.left {
      background: linear-gradient(90deg, transparent, #f59e0b);
    }

    /* THANK YOU — hero */
    .thanks {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(5rem, 13vw, 12rem);
      line-height: 0.95;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #ef4444 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 40px rgba(245, 158, 11, 0.3));
      opacity: 0;
      animation: fadeUp 1s 0.55s forwards;
    }

    .closing-line {
      font-size: clamp(1.1rem, 1.6vw, 1.5rem);
      font-weight: 200;
      color: #d4d4d8;
      margin-top: 2rem;
      letter-spacing: -0.01em;
      opacity: 0;
      animation: fadeUp 0.8s 1.1s forwards;
      max-width: 720px;
    }

    .closing-line .em {
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      color: #fbbf24;
    }

    /* LinkedIn CTA — large, prominent */
    .linkedin-block {
      margin-top: 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      opacity: 0;
      animation: fadeUp 0.8s 1.5s forwards;
    }

    .linkedin-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #888;
    }

    .linkedin-cta {
      display: inline-flex;
      align-items: center;
      gap: 1.2rem;
      padding: 1.1rem 2rem;
      background: rgba(245, 158, 11, 0.06);
      border: 1.5px solid rgba(245, 158, 11, 0.4);
      border-radius: 14px;
      text-decoration: none;
      color: inherit;
      font-family: 'JetBrains Mono', monospace;
      transition: all 0.3s ease;
      cursor: pointer;
      box-shadow: 0 0 32px rgba(245, 158, 11, 0.1);
    }

    .linkedin-cta:hover {
      border-color: #fbbf24;
      background: rgba(245, 158, 11, 0.12);
      transform: translateY(-2px);
      box-shadow: 0 8px 48px rgba(245, 158, 11, 0.25);
    }

    .linkedin-cta:hover .linkedin-icon {
      background: #fbbf24;
      color: #0a0a0b;
    }

    .linkedin-cta:hover .arrow { transform: translateX(6px); }

    .linkedin-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: rgba(245, 158, 11, 0.18);
      border: 1px solid rgba(245, 158, 11, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      font-weight: 700;
      color: #fbbf24;
      letter-spacing: 0.02em;
      transition: all 0.3s;
    }

    .linkedin-url {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.2rem;
    }

    .linkedin-url .small {
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #888;
    }

    .linkedin-url .full {
      font-size: 1.25rem;
      color: #fafafa;
      letter-spacing: -0.005em;
      font-weight: 500;
    }

    .linkedin-url .full .accent {
      color: #fbbf24;
    }

    .linkedin-cta .arrow {
      color: #fbbf24;
      font-size: 1.4rem;
      transition: transform 0.3s ease;
    }

    /* Speaker mini at bottom */
    .speaker-sig {
      display: flex;
      align-items: center;
      gap: 1rem;
      opacity: 0;
      animation: fadeUp 0.6s 1.9s forwards;
    }

    .avatar-sig {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      background: radial-gradient(circle at 30% 30%, #2a1f10, #0e0a06);
      border: 1.5px solid rgba(245, 158, 11, 0.4);
      box-shadow: 0 0 12px rgba(245, 158, 11, 0.18);
    }

    .avatar-sig::before {
      content: 'AC';
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Instrument Serif', Georgia, serif;
      font-style: italic;
      font-size: 1rem;
      color: #fbbf24;
      z-index: 0;
    }

    .avatar-sig img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    .speaker-sig .info {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.15rem;
    }

    .speaker-sig .name {
      font-size: 0.95rem;
      color: #fafafa;
      font-weight: 500;
    }

    .speaker-sig .meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #777;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hint {
      position: fixed; bottom: 1.5rem; right: 1.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #444;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.06);
      padding: 0.5rem 1rem;
      border-radius: 999px;
      z-index: 10;
      cursor: pointer;
      backdrop-filter: blur(8px);
    }
    .hint:hover { color: #f59e0b; border-color: rgba(245, 158, 11, 0.3); }
    body:fullscreen .hint, body:-webkit-full-screen .hint { display: none; }
  </style>
</head>
<body>
  <!-- Floating gold sparkles -->
  <span class="sparkle"></span>
  <span class="sparkle"></span>
  <span class="sparkle"></span>
  <span class="sparkle"></span>
  <span class="sparkle"></span>
  <span class="sparkle"></span>

  <div class="slide">
    <header class="header">
      <div class="badge">
        <span class="badge-dot"></span>
        <span>AI in Action · Rotaract Club, MNM Jain</span>
      </div>
      <div class="right">
        <span>27 Apr 2026</span>
        <span class="sep"></span>
        <span class="clock" id="clock">--:--:-- IST</span>
        <span class="sep"></span>
        <span>End of Demo</span>
      </div>
    </header>

    <main class="stage">
      <div class="pretitle">
        <span class="line left"></span>
        <span>that's a wrap</span>
        <span class="line"></span>
      </div>

      <h1 class="thanks">Thank You</h1>

      <p class="closing-line">
        For your time, your attention, and the conversation ahead.
      </p>

      <div class="linkedin-block">
        <span class="linkedin-label">Let's stay connected</span>
        <a class="linkedin-cta" href="https://linkedin.com/in/aruncastromin" target="_blank" rel="noopener noreferrer">
          <div class="linkedin-icon">in</div>
          <div class="linkedin-url">
            <span class="small">LinkedIn</span>
            <span class="full">linkedin.com/in/<span class="accent">aruncastromin</span></span>
          </div>
          <span class="arrow">&rarr;</span>
        </a>
      </div>
    </main>

    <footer style="display: flex; justify-content: center;">
      <div class="speaker-sig">
        <div class="avatar-sig">
          <img src="assets/my%20profile.jpeg" alt="Arun Castro" onerror="this.style.display='none'" />
        </div>
        <div class="info">
          <span class="name">Arun Castro</span>
          <span class="meta">Sr. Technology Architect &middot; Chennai</span>
        </div>
      </div>
    </footer>
  </div>

  <button class="hint" onclick="document.documentElement.requestFullscreen()">F = Fullscreen</button>

  <script>
    function updateClock() {
      const d = new Date();
      const opts = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true, timeZone: 'Asia/Kolkata' };
      const time = d.toLocaleTimeString('en-IN', opts).replace(/\s/g, ' ');
      const el = document.getElementById('clock');
      if (el) el.textContent = time + ' IST';
    }
    updateClock();
    setInterval(updateClock, 1000);

    document.addEventListener('keydown', (e) => {
      if (e.key === 'f' || e.key === 'F' || e.key === 'Enter') {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen();
      }
      if (e.key === 'Escape' && document.fullscreenElement) document.exitFullscreen();
    });
  </script>

  <script>
    if (window.parent !== window) {
      window.addEventListener('keydown', (e) => {
        const navKeys = ['ArrowRight','ArrowLeft',' ','PageDown','PageUp','Home','End','1','2','3','4','5','6','7','f','F','h','H','?','Escape'];
        if (navKeys.includes(e.key)) {
          window.parent.postMessage({ type: 'deckKey', key: e.key, shiftKey: e.shiftKey }, '*');
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      }, true);
    }
  </script>
</body>
</html>
